<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Télécharge gratuitement vidéos YouTube, TikTok, Facebook, Instagram. MP3, 720p, 1080p.">
    <meta name="keywords" content="youtube downloader, tiktok downloader, video mp3, download video online">
    <title>Smart Video Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>Smart Video Downloader</h1>
    <p>Télécharge vidéos YouTube, TikTok, Facebook, Instagram facilement</p>
</header>

<div class="container">

    {% if message %}
        <p class="message">{{ message }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="url" placeholder="Colle le lien de la vidéo" required>
        <button type="submit">Analyser la vidéo</button>
    </form>

    {% if video %}
        <div class="video-box">
            <img src="{{ video.thumbnail }}" alt="Thumbnail">
            <h2>{{ video.title }}</h2>

            <form action="/download" method="POST">
                <input type="hidden" name="url" value="{{ video.url }}">
                <select name="quality" required>
                    <option value="mp3">MP3</option>
                    <option value="720">720p</option>
                    <option value="1080">1080p</option>
                </select>
                <button type="submit">Télécharger</button>
            </form>
        </div>
    {% endif %}

</div>

</body>
</html>
